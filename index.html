<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
   <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
      <!-- style css -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
   <section class="container px-5 mx-auto bg-[#F8FAFC] my-9 md:my-[60px]">
      <h1 class="text-[#002C5C] font-bold text-2xl md:text-[2rem] mb-5">
        Job Application Tracker
      </h1>
      <div class="application-number grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="total bg-white p-5 rounded-lg">
          <h3 class="text-[#323B49] font-medium mb-2">Total</h3>
          <p id="count-all" class="text-[#002C5C] font-bold text-2xl">8</p>
        </div>
        <div class="interview bg-white p-5 rounded-lg">
          <h3 class="text-[#323B49] font-medium mb-2">Interview</h3>
          <p id="count-interview" class="text-[#10B981] font-bold text-2xl">0</p>
        </div>
        <div class="rejected bg-white p-5 rounded-lg">
          <h3 class="text-[#323B49] font-medium mb-2">Rejected</h3>
          <p id="count-rejected" class="text-[#EF4444] font-bold text-2xl">0</p>
        </div>
      </div>

        <hr class="border-[#E6E7E9] border-2 my-[30px]" />

      <div class="available-jobs">
        <h2 class="text-[#002C5C] font-semibold text-[1.25rem]">
          Available Jobs
        </h2>
        <h2 id="span-count"></h2>
      </div>
        
      <div class="buttons mb-4">
        <button class="filter-btn rounded-sm px-10 py-2 bg-[#FFFFFF] active mr-2 text-[#64748B]" value="all">All</button>
        <button class="filter-btn rounded-sm px-3 py-2 bg-[#FFFFFF] mr-2 text-[#64748B]" value="INTERVIEW">Interview</button>
        <button class="filter-btn rounded-sm px-4 py-2 bg-[#FFFFFF] text-[#64748B]" value="REJECTED">Rejected</button>
      </div>
      <div id="cards">

      </div>

    </section>
  <script src="script.js"></script>
</body>
</html>
